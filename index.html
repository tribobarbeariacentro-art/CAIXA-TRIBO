<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Caixa - Tribo Barbearia Centro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg: #111311;
  --surface: #181B18;
  --surface2: #1F231F;
  --line: #2A302A;
  --text: #FFFFFF;
  --muted: #7A8A7A;
  --green: #93C404;
  --entrada: #93C404;
  --saida: #E05047;
  --amber: #D9A83C;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.mono{font-family:'IBM Plex Mono',monospace;}

/* ── HEADER ─────────────────────────────── */
.app-header{
  background:#0D0F0D;
  padding:20px 20px 16px;
  text-align:center;
  position:relative;
}
.app-header::after{
  content:'';
  display:block;
  height:3px;
  background:linear-gradient(90deg, transparent, var(--green) 30%, var(--green) 70%, transparent);
  margin-top:16px;
}
.app-header .logo-icon{
  height:60px;
  width:auto;
  display:block;
  margin:0 auto;
  filter:drop-shadow(0 0 12px rgba(147,196,4,.3));
}
.app-header .sub{
  margin:10px 0 0;
  font-family:'Oswald',sans-serif;
  font-size:11px;
  letter-spacing:.35em;
  color:var(--muted);
  text-transform:uppercase;
}
.app-header p:last-child{
  margin:4px 0 0;
  font-size:10px;
  color:#4A5A4A;
  letter-spacing:.08em;
}

/* ── TABS ────────────────────────────────── */
.tabs{
  display:flex;
  background:#0D0F0D;
  border-bottom:1px solid var(--line);
  overflow-x:auto;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  flex:1;
  min-width:80px;
  padding:13px 8px;
  background:none;
  border:none;
  color:var(--muted);
  font-family:'Oswald',sans-serif;
  font-size:11.5px;
  letter-spacing:.06em;
  text-transform:uppercase;
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .15s, border-color .15s;
  white-space:nowrap;
}
.tab-btn:hover{color:#bbb;}
.tab-btn.active{
  color:var(--green);
  border-bottom-color:var(--green);
  background:rgba(147,196,4,.04);
}

/* ── CONTENT ─────────────────────────────── */
#content{padding:16px; max-width:860px; margin:0 auto 80px;}

/* ── CARDS ───────────────────────────────── */
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:12px;
  padding:18px;
  margin-bottom:14px;
}
.card h3{
  font-family:'Oswald',sans-serif;
  font-size:11px;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--muted);
  margin:0 0 14px;
}

/* ── GRIDS ───────────────────────────────── */
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}
@media(max-width:480px){.grid3{grid-template-columns:1fr;}}

/* ── STAT BOXES ──────────────────────────── */
.stat-box{
  text-align:center;
  padding:14px 8px;
  background:var(--surface2);
  border-radius:10px;
  border:1px solid var(--line);
}
.stat-box .n{
  font-family:'IBM Plex Mono',monospace;
  font-size:20px;
  font-weight:600;
  line-height:1.1;
}
.stat-box .l{
  font-size:9.5px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.1em;
  margin-top:4px;
}

/* Card saldo destacado */
.saldo-card{
  background:linear-gradient(135deg, #141714 0%, #1A1F1A 100%);
  border:1px solid rgba(147,196,4,.2);
  border-radius:14px;
  padding:24px 18px;
  margin-bottom:14px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.saldo-card::before{
  content:'';
  position:absolute;
  top:-40px; right:-40px;
  width:120px; height:120px;
  background:radial-gradient(circle, rgba(147,196,4,.08) 0%, transparent 70%);
  pointer-events:none;
}
.saldo-card .label-saldo{
  font-family:'Oswald',sans-serif;
  font-size:10px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:8px;
}
.saldo-card .valor-saldo{
  font-family:'IBM Plex Mono',monospace;
  font-size:36px;
  font-weight:600;
  color:var(--green);
  line-height:1;
}
.saldo-card .descricao-saldo{
  font-size:10px;
  color:#4A5A4A;
  margin-top:6px;
  letter-spacing:.05em;
}

/* ── FORMULÁRIO ──────────────────────────── */
label{
  display:block;
  font-size:10px;
  color:var(--muted);
  margin-bottom:5px;
  text-transform:uppercase;
  letter-spacing:.08em;
}
input, select{
  width:100%;
  padding:11px 12px;
  background:var(--surface2);
  border:1px solid var(--line);
  border-radius:8px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:14px;
  margin-bottom:12px;
  transition:border-color .15s;
}
input:focus, select:focus{
  outline:none;
  border-color:var(--green);
  box-shadow:0 0 0 3px rgba(147,196,4,.08);
}

/* ── BOTÕES ──────────────────────────────── */
.btn{
  padding:13px 18px;
  border-radius:8px;
  border:none;
  font-family:'Oswald',sans-serif;
  font-size:13px;
  letter-spacing:.06em;
  text-transform:uppercase;
  cursor:pointer;
  transition:opacity .15s, transform .1s;
}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--green); color:#0D0F0D; font-weight:600;}
.btn-primary:hover{opacity:.9;}
.btn-entrada{background:var(--entrada); color:#0A1200; font-weight:600;}
.btn-saida{background:var(--saida); color:#fff; font-weight:600;}
.btn-ghost{background:transparent; border:1px solid var(--line); color:var(--muted);}
.btn-ghost:hover{border-color:var(--text); color:var(--text);}
.btn:disabled{opacity:.35; cursor:not-allowed;}

/* ── TOGGLE TIPO ─────────────────────────── */
.type-toggle{display:flex; gap:8px; margin-bottom:14px;}
.type-toggle button{
  flex:1; padding:12px;
  border-radius:8px;
  border:1px solid var(--line);
  background:var(--surface2);
  color:var(--muted);
  font-family:'Oswald',sans-serif;
  font-size:13px;
  letter-spacing:.05em;
  cursor:pointer;
  transition:all .15s;
}
.type-toggle button.sel-entrada{
  background:rgba(147,196,4,.12);
  border-color:var(--entrada);
  color:var(--entrada);
}
.type-toggle button.sel-saida{
  background:rgba(224,80,71,.12);
  border-color:var(--saida);
  color:var(--saida);
}

/* ── NAVEGAÇÃO DE MÊS ────────────────────── */
.month-nav{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  margin-bottom:16px;
}
.month-nav button{
  background:var(--surface2);
  border:1px solid var(--line);
  color:var(--text);
  width:36px; height:36px;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  transition:border-color .15s;
}
.month-nav button:hover{border-color:var(--green);}
.month-nav .label{
  font-family:'Oswald',sans-serif;
  font-size:18px;
  letter-spacing:.04em;
  text-transform:uppercase;
}

/* ── TABELA ──────────────────────────────── */
table{width:100%; border-collapse:collapse; font-size:13px;}
th{
  text-align:left;
  font-size:9.5px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted);
  padding:8px 8px;
  border-bottom:1px solid var(--line);
}
td{
  padding:10px 8px;
  border-bottom:1px solid #1E231E;
  vertical-align:top;
}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.018);}
.val-entrada{color:var(--entrada);}
.val-saida{color:var(--saida);}
.right{text-align:right;}
.center{text-align:center;}
.small-del{
  background:none; border:none;
  color:var(--line); cursor:pointer;
  font-size:14px; padding:2px 4px;
  border-radius:4px;
  transition:color .1s, background .1s;
}
.small-del:hover{color:var(--saida); background:rgba(224,80,71,.1);}

/* ── BADGES ──────────────────────────────── */
.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.05em;
  font-weight:600;
  cursor:pointer;
}
.badge-pendente{
  background:rgba(217,168,60,.12);
  color:var(--amber);
  border:1px solid rgba(217,168,60,.25);
}
.badge-pago{
  background:rgba(147,196,4,.12);
  color:var(--entrada);
  border:1px solid rgba(147,196,4,.25);
}

/* ── EMPTY STATE ─────────────────────────── */
.empty{
  text-align:center;
  padding:40px 10px;
  color:var(--muted);
  font-size:13px;
  opacity:.6;
}

/* ── CHART ───────────────────────────────── */
.chart-wrap{position:relative; height:200px; margin-top:16px;}

/* ── EXTRATO ─────────────────────────────── */
.statement{
  background:#fff; color:#111;
  padding:24px; border-radius:8px;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
}
.statement h2{font-family:'Oswald',sans-serif; color:#111; font-size:18px; margin:0 0 2px;}
.statement .sub{color:#555; font-size:11px; margin-bottom:14px;}
.statement table{font-size:11.5px;}
.statement th, .statement td{border-bottom:1px solid #eee; color:#111;}
.statement .val-entrada{color:#3a7a1a;}
.statement .val-saida{color:#c03020;}

@media print{
  .no-print{display:none !important;}
  body{background:#fff;}
  #content{max-width:none; padding:0;}
  .statement{border:none; padding:0;}
}
</style>
</head>

<script>
/* ---------- storage helpers (Firestore) ---------- */
// Objeto vindo do Firebase (Configurações do projeto > Geral > Seus apps > Web).
// Substitua os valores abaixo pelos do seu projeto antes de publicar o site.
const firebaseConfig = {
  apiKey: "AIzaSyDCoZmCWQIQH_k7WCu0qHbaQq57ZiWqM9Y",
  authDomain: "caixa-tribo-barbearia.firebaseapp.com",
  projectId: "caixa-tribo-barbearia",
  storageBucket: "caixa-tribo-barbearia.firebasestorage.app",
  messagingSenderId: "564183909709",
  appId: "1:564183909709:web:7eeac8e5c14eeaaf84e304"
};

let db = null;

async function initFirebase(){
  const isConfigured = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith('COLE_AQUI');
  if(!isConfigured){
    document.getElementById('content').innerHTML = `
      <div class="card" style="max-width:520px; margin:60px auto;">
        <h3>Falta configurar o Firebase</h3>
        <p style="color:var(--muted); font-size:13.5px; line-height:1.5;">
          Abra o arquivo HTML deste site e substitua o objeto <code>firebaseConfig</code>,
          perto do topo do código, pelos valores do seu projeto no Firebase
          (Configurações do projeto &gt; Geral &gt; Seus apps &gt; Web).
          Sem isso o app não tem onde salvar os dados.
        </p>
      </div>`;
    throw new Error('Firebase não configurado');
  }
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
  const { getFirestore, doc, getDoc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
  const { getAuth, signInAnonymously } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');

  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  const auth = getAuth(app);
  await signInAnonymously(auth);

  window._fs = { doc, getDoc, setDoc };
}

async function getData(collectionName, key){
  try{
    const { doc, getDoc } = window._fs;
    const ref = doc(db, collectionName, key);
    const snap = await getDoc(ref);
    return snap.exists() ? snap.data().payload : null;
  }catch(e){ console.error('firestore get error', e); return null; }
}
async function setData(collectionName, key, value){
  try{
    const { doc, setDoc } = window._fs;
    const ref = doc(db, collectionName, key);
    await setDoc(ref, { payload: value, updatedAt: new Date().toISOString() });
    return true;
  }catch(e){ console.error('firestore set error', e); alert('Não foi possível salvar. Verifique sua conexão.'); return false; }
}

/* ---------- constants ---------- */
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const ENTRADA_CATS = ['Serviços do dia','Assinatura','Saldo anterior','Venda de produto','Outras entradas'];
const SAIDA_CATS = ['Salário/Comissão','Adiantamento','Fornecedor/Produtos','Aluguel','Energia','Água','Internet','Marketing','Sistema/Assinatura','Manutenção','Outros'];
const PAYABLE_CATS = ['Fornecedor','Salário','Despesa Fixa','Outros'];
const PAYABLE_TO_SAIDA = {'Fornecedor':'Fornecedor/Produtos','Salário':'Salário/Comissão','Despesa Fixa':'Outros','Outros':'Outros'};
const FUNCIONARIOS = ['Juan','Marcus','Raiane','Adrielly','Angelo','Diego','Outro'];

// Login simples por usuário e senha. Isso NÃO é segurança forte: qualquer pessoa
// que abrir o código-fonte do site (F12 > Fontes) consegue ler essas senhas.
// Serve pra impedir que alguém abra o link por acaso e comece a editar o caixa,
// não pra proteger contra alguém que sabe o que está fazendo.
const USERS = {
  'diego': { senha: 'diego123', nome: 'Diego' },
  'bianca': { senha: 'bianca123', nome: 'Bianca' },
  'johann': { senha: 'johann123', nome: 'Johann' }
};

/* ---------- utils ---------- */
function todayISO(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function monthKeyOf(d){ return d.slice(0,7); }
function monthLabel(key){ const [y,m] = key.split('-'); return MESES[parseInt(m,10)-1] + ' ' + y; }
function fmtMoney(n){ return (n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function fmtDateBR(d){ const [y,m,day] = d.split('-'); return day+'/'+m+'/'+y; }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function shiftMonth(key, delta){
  const [y,m] = key.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

/* ---------- state ---------- */
let state = {
  activeTab: 'hoje',
  currentMonth: monthKeyOf(todayISO()),
  monthCache: {},
  payablesCache: {},
  entryForm: { type:'entrada', date: todayISO(), category: ENTRADA_CATS[0], description:'', amount:'', funcionario:'' },
  payableForm: { dueDate: todayISO(), category: PAYABLE_CATS[0], description:'', amount:'', funcionario:'' },
  extrato: { start:'', end:'', result:null },
  editingEntry: null,
  editingPayable: null,
  currentUser: null,
  loaded:false
};

async function loadMonth(key){
  if(state.monthCache[key]) return state.monthCache[key];
  let d = await getData('meses', key);
  if(!d) d = { openingBalance:0, entries:[] };
  state.monthCache[key] = d;
  return d;
}
async function saveMonth(key){
  await setData('meses', key, state.monthCache[key]);
}
async function loadPayables(key){
  if(state.payablesCache[key]) return state.payablesCache[key];
  let d = await getData('contas', key);
  if(!d) d = [];
  state.payablesCache[key] = d;
  return d;
}
async function savePayables(key){
  await setData('contas', key, state.payablesCache[key]);
}

function monthTotals(key){
  const data = state.monthCache[key] || {openingBalance:0, entries:[]};
  const entries = [...data.entries].sort((a,b)=> a.date.localeCompare(b.date) || 0);
  let running = data.openingBalance;
  const rows = entries.map(e=>{
    running += (e.type==='entrada' ? e.amount : -e.amount);
    return {...e, saldo: running};
  });
  const totalEntrada = entries.filter(e=>e.type==='entrada').reduce((s,e)=>s+e.amount,0);
  const totalSaida = entries.filter(e=>e.type==='saida').reduce((s,e)=>s+e.amount,0);
  return { rows, totalEntrada, totalSaida, saldoFinal: running, openingBalance: data.openingBalance };
}

function sumAdiantamentos(monthKey, funcionario){
  const data = state.monthCache[monthKey];
  if(!data || !funcionario) return 0;
  return data.entries
    .filter(e => e.type==='saida' && e.category==='Adiantamento' && e.funcionario===funcionario)
    .reduce((s,e)=>s+e.amount, 0);
}

/* ---------- login ---------- */
function checkSavedLogin(){
  const saved = localStorage.getItem('tribo-user');
  if(saved && USERS[saved]) state.currentUser = saved;
}
function doLogin(username, senha){
  const u = USERS[username];
  if(!u || u.senha !== senha) return false;
  state.currentUser = username;
  localStorage.setItem('tribo-user', username);
  return true;
}
function doLogout(){
  state.currentUser = null;
  localStorage.removeItem('tribo-user');
  render();
}
function renderLogin(errorMsg){
  return `
  <div style="max-width:340px; margin:70px auto; padding:0 16px;">
    <div class="card">
      <h3 style="text-align:center; margin-bottom:16px;">Entrar</h3>
      ${errorMsg ? `<p style="color:var(--saida); font-size:12.5px; text-align:center;">${errorMsg}</p>` : ''}
      <label>Usuário</label>
      <input type="text" id="login-user" autocomplete="username" placeholder="diego, bianca ou johann">
      <label>Senha</label>
      <input type="password" id="login-pass" autocomplete="current-password">
      <button class="btn btn-primary" data-act="do-login" style="width:100%; margin-top:6px;">Entrar</button>
    </div>
  </div>`;
}

/* ---------- mutations ---------- */
async function addEntry(form){
  const key = monthKeyOf(form.date);
  await loadMonth(key);
  state.monthCache[key].entries.push({
    id: genId(), date: form.date, type: form.type, category: form.category,
    description: form.description || form.category, amount: parseFloat(form.amount),
    funcionario: form.funcionario || null,
    criadoPor: USERS[state.currentUser] ? USERS[state.currentUser].nome : state.currentUser
  });
  await saveMonth(key);
  if(key !== state.currentMonth){ /* keep currentMonth as is, just note it landed elsewhere */ }
  render();
}
async function deleteEntry(key, id){
  if(!confirm('Excluir este lançamento?')) return;
  state.monthCache[key].entries = state.monthCache[key].entries.filter(e=>e.id!==id);
  await saveMonth(key);
  render();
}
async function updateEntry(oldKey, id, form){
  await loadMonth(oldKey);
  const idx = state.monthCache[oldKey].entries.findIndex(e=>e.id===id);
  if(idx===-1) return;
  const original = state.monthCache[oldKey].entries[idx];
  const newKey = monthKeyOf(form.date);
  const updated = {
    ...original,
    date: form.date, type: form.type, category: form.category,
    description: form.description || form.category, amount: parseFloat(form.amount),
    funcionario: form.funcionario || null
  };
  if(newKey === oldKey){
    state.monthCache[oldKey].entries[idx] = updated;
    await saveMonth(oldKey);
  } else {
    state.monthCache[oldKey].entries.splice(idx,1);
    await saveMonth(oldKey);
    await loadMonth(newKey);
    state.monthCache[newKey].entries.push(updated);
    await saveMonth(newKey);
  }
  render();
}
async function updateOpeningBalance(key, val){
  await loadMonth(key);
  state.monthCache[key].openingBalance = parseFloat(val)||0;
  await saveMonth(key);
  render();
}
async function addPayable(form){
  const key = monthKeyOf(form.dueDate);
  await loadPayables(key);
  state.payablesCache[key].push({
    id: genId(), dueDate: form.dueDate, category: form.category,
    description: form.description || form.category, amount: parseFloat(form.amount),
    status:'pendente', paidEntryId:null, funcionario: form.funcionario || null,
    criadoPor: USERS[state.currentUser] ? USERS[state.currentUser].nome : state.currentUser
  });
  await savePayables(key);
  render();
}
async function deletePayable(key, id){
  if(!confirm('Excluir esta conta?')) return;
  const p = state.payablesCache[key].find(x=>x.id===id);
  if(p && p.paidEntryId){
    await loadMonth(key);
    state.monthCache[key].entries = state.monthCache[key].entries.filter(e=>e.id!==p.paidEntryId);
    await saveMonth(key);
  }
  state.payablesCache[key] = state.payablesCache[key].filter(x=>x.id!==id);
  await savePayables(key);
  render();
}
async function updatePayable(oldKey, id, form){
  await loadPayables(oldKey);
  const idx = state.payablesCache[oldKey].findIndex(p=>p.id===id);
  if(idx===-1) return;
  const original = state.payablesCache[oldKey][idx];
  const newAmount = parseFloat(form.amount);
  const newKey = monthKeyOf(form.dueDate);

  // Se já está paga e tem lançamento vinculado, atualiza o lançamento pra bater com o novo valor/descrição.
  if(original.status === 'pago' && original.paidEntryId){
    const linkedKey = original.paidEntryMonth || oldKey;
    await loadMonth(linkedKey);
    const eIdx = state.monthCache[linkedKey].entries.findIndex(e=>e.id===original.paidEntryId);
    if(eIdx !== -1){
      state.monthCache[linkedKey].entries[eIdx].amount = newAmount;
      state.monthCache[linkedKey].entries[eIdx].description = 'Pagamento: ' + (form.description || form.category);
      state.monthCache[linkedKey].entries[eIdx].funcionario = form.funcionario || null;
      await saveMonth(linkedKey);
    }
  }

  const updated = {
    ...original, dueDate: form.dueDate, category: form.category,
    description: form.description || form.category, amount: newAmount,
    funcionario: form.funcionario || null
  };
  if(newKey === oldKey){
    state.payablesCache[oldKey][idx] = updated;
    await savePayables(oldKey);
  } else {
    state.payablesCache[oldKey].splice(idx,1);
    await savePayables(oldKey);
    await loadPayables(newKey);
    state.payablesCache[newKey].push(updated);
    await savePayables(newKey);
  }
  render();
}
async function togglePaid(key, id){
  const list = state.payablesCache[key];
  const p = list.find(x=>x.id===id);
  if(p.status === 'pendente'){
    const paymentDate = todayISO();
    const entryKey = monthKeyOf(paymentDate);
    await loadMonth(entryKey);
    const valorAPagar = restanteAPagar(p, key);
    if(valorAPagar <= 0){
      alert('O adiantamento já dado cobre ou passa do valor dessa conta. Nada a lançar como saída. Marcando como paga mesmo assim.');
    }
    const entryId = genId();
    if(valorAPagar > 0){
      state.monthCache[entryKey].entries.push({
        id: entryId, date: paymentDate, type:'saida',
        category: PAYABLE_TO_SAIDA[p.category] || 'Outros',
        description: 'Pagamento: ' + p.description + (valorAPagar !== p.amount ? ' (já descontado adiantamento)' : ''),
        amount: valorAPagar,
        funcionario: p.funcionario || null
      });
      await saveMonth(entryKey);
    }
    p.status = 'pago';
    p.paidEntryId = valorAPagar > 0 ? entryId : null;
    p.paidEntryMonth = valorAPagar > 0 ? entryKey : null;
  } else {
    const entryKey = p.paidEntryMonth || key;
    if(p.paidEntryId){
      await loadMonth(entryKey);
      state.monthCache[entryKey].entries = state.monthCache[entryKey].entries.filter(e=>e.id!==p.paidEntryId);
      await saveMonth(entryKey);
    }
    p.status = 'pendente';
    p.paidEntryId = null;
    p.paidEntryMonth = null;
  }
  await savePayables(key);
  render();
}

/* ---------- render ---------- */
function render(){
  const tabsEl = document.getElementById('tabs');
  const el = document.getElementById('content');

  if(!state.currentUser){
    tabsEl.innerHTML = '';
    el.innerHTML = renderLogin(state.loginError);
    attachEvents();
    return;
  }

  renderTabs();
  if(state.activeTab==='hoje') el.innerHTML = renderHoje();
  else if(state.activeTab==='mes') { el.innerHTML = renderMes(); drawChart(); }
  else if(state.activeTab==='contas') el.innerHTML = renderContas();
  else if(state.activeTab==='extrato') el.innerHTML = renderExtrato();
  attachEvents();
}

function renderTabs(){
  const tabs = [['hoje','Hoje'],['mes','Livro do Mês'],['contas','Contas a Pagar'],['extrato','Extrato PDF']];

function drawChart(){
  const key = state.currentMonth;
  const t = monthTotals(key);
  const canvas = document.getElementById('month-chart');
  if(!canvas) return;
  const byDay = {};
  t.rows.forEach(e=>{
    if(!byDay[e.date]) byDay[e.date] = {entrada:0, saida:0};
    byDay[e.date][e.type] += e.amount;
  });
  const days = Object.keys(byDay).sort();
  if(window._chartInstance) window._chartInstance.destroy();
  window._chartInstance = new Chart(canvas, {
    data: {
      labels: days.map(d=>d.slice(8,10)),
      datasets: [
        { type:'bar', label:'Entradas', data: days.map(d=>byDay[d].entrada), backgroundColor:'#5E9468' },
        { type:'bar', label:'Saídas', data: days.map(d=>byDay[d].saida), backgroundColor:'#BD5B50' },
        { type:'line', label:'Saldo', data: (()=>{ let r=t.openingBalance; const arr=[]; days.forEach(d=>{ r += byDay[d].entrada - byDay[d].saida; arr.push(r); }); return arr; })(),
          borderColor:'#C08A45', backgroundColor:'transparent', tension:.3, yAxisID:'y1' }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      scales: {
        y: { grid:{color:'#3A332A'}, ticks:{color:'#A89A87'} },
        y1: { position:'right', grid:{display:false}, ticks:{color:'#C08A45'} },
        x: { grid:{display:false}, ticks:{color:'#A89A87'} }
      },
      plugins: { legend:{ labels:{ color:'#EDE4D3' } } }
    }
  });
}

function restanteAPagar(p, key){
  if(p.category==='Salário' && p.funcionario){
    const adiantado = sumAdiantamentos(key, p.funcionario);
    return Math.max(0, p.amount - adiantado);
  }
  return p.amount;
}

  }

  return `
    <div class="card">
      <h3>Gerar extrato por período</h3>
      <div class="grid2">
        <div><label>De</label><input type="date" id="ext-start" value="${state.extrato.start}"></div>
        <div><label>Até</label><input type="date" id="ext-end" value="${state.extrato.end}"></div>
      </div>
      <button class="btn btn-primary" data-act="gen-extrato" style="width:100%;">Gerar extrato</button>
    </div>
    ${statementHTML}
  `;
}

/* ---------- events ---------- */
function attachEvents(){
  document.getElementById('tabs').onclick = (e)=>{
    const logoutBtn = e.target.closest('[data-act="logout"]');
    if(logoutBtn){ doLogout(); return; }
    const b = e.target.closest('[data-tab]');
    if(!b) return;
    state.activeTab = b.dataset.tab;
    render();
  };

  const c = document.getElementById('content');
  c.onclick = async (e)=>{
    const b = e.target.closest('[data-act]');
    if(!b) return;
    const act = b.dataset.act;

    if(act==='do-login'){
      const user = document.getElementById('login-user').value.trim().toLowerCase();
      const pass = document.getElementById('login-pass').value;
      if(doLogin(user, pass)){
        state.loginError = null;
        await boot();
      } else {
        state.loginError = 'Usuário ou senha incorretos.';
        render();
      }
      return;
    }
    if(act==='set-type'){
      state.entryForm.type = b.dataset.val;
      state.entryForm.category = (b.dataset.val==='entrada'?ENTRADA_CATS:SAIDA_CATS)[0];
      render();
    }
    else if(act==='save-entry'){
      const date = document.getElementById('ef-date').value;
      const category = document.getElementById('ef-cat').value;
      const description = document.getElementById('ef-desc').value;
      const amount = document.getElementById('ef-amount').value;
      const funcEl = document.getElementById('ef-func');
      const funcionario = funcEl ? funcEl.value : '';
      if(!date || !amount || parseFloat(amount)<=0){ alert('Preencha data e um valor válido.'); return; }
      if(state.editingEntry){
        await updateEntry(state.editingEntry.key, state.editingEntry.id, { type: state.entryForm.type, date, category, description, amount, funcionario });
        state.editingEntry = null;
      } else {
        await addEntry({ type: state.entryForm.type, date, category, description, amount, funcionario });
      }
      state.entryForm.description = ''; state.entryForm.amount = ''; state.entryForm.funcionario = '';
    }
    else if(act==='edit-entry'){
      const key = b.dataset.key, id = b.dataset.id;
      await loadMonth(key);
      const entry = state.monthCache[key].entries.find(e=>e.id===id);
      if(!entry) return;
      state.editingEntry = { key, id };
      state.entryForm = { type: entry.type, date: entry.date, category: entry.category, description: entry.description, amount: entry.amount, funcionario: entry.funcionario || '' };
      render();
    }
    else if(act==='cancel-edit-entry'){
      state.editingEntry = null;
      state.entryForm = { type:'entrada', date: todayISO(), category: ENTRADA_CATS[0], description:'', amount:'', funcionario:'' };
      render();
    }
    else if(act==='del-entry'){ await deleteEntry(b.dataset.key, b.dataset.id); }
    else if(act==='month-prev'){ state.currentMonth = shiftMonth(state.currentMonth,-1); await loadMonth(state.currentMonth); await loadPayables(state.currentMonth); render(); }
    else if(act==='month-next'){ state.currentMonth = shiftMonth(state.currentMonth,1); await loadMonth(state.currentMonth); await loadPayables(state.currentMonth); render(); }
    else if(act==='save-payable'){
      const dueDate = document.getElementById('pf-date').value;
      const category = document.getElementById('pf-cat').value;
      const description = document.getElementById('pf-desc').value;
      const amount = document.getElementById('pf-amount').value;
      const funcEl = document.getElementById('pf-func');
      const funcionario = funcEl ? funcEl.value : '';
      if(!dueDate || !amount || parseFloat(amount)<=0){ alert('Preencha vencimento e um valor válido.'); return; }
      if(state.editingPayable){
        await updatePayable(state.editingPayable.key, state.editingPayable.id, { dueDate, category, description, amount, funcionario });
        state.editingPayable = null;
      } else {
        await addPayable({ dueDate, category, description, amount, funcionario });
      }
      state.payableForm.description=''; state.payableForm.amount=''; state.payableForm.funcionario='';
    }
    else if(act==='edit-payable'){
      const key = b.dataset.key, id = b.dataset.id;
      await loadPayables(key);
      const p = state.payablesCache[key].find(x=>x.id===id);
      if(!p) return;
      state.editingPayable = { key, id };
      state.payableForm = { dueDate: p.dueDate, category: p.category, description: p.description, amount: p.amount, funcionario: p.funcionario || '' };
      render();
    }
    else if(act==='cancel-edit-payable'){
      state.editingPayable = null;
      state.payableForm = { dueDate: todayISO(), category: PAYABLE_CATS[0], description:'', amount:'', funcionario:'' };
      render();
    }
    else if(act==='del-payable'){ await deletePayable(b.dataset.key, b.dataset.id); }
    else if(act==='toggle-paid'){ await togglePaid(b.dataset.key, b.dataset.id); }
    else if(act==='gen-extrato'){
      const start = document.getElementById('ext-start').value;
      const end = document.getElementById('ext-end').value;
      if(!start || !end || start>end){ alert('Verifique as datas selecionadas.'); return; }
      state.extrato.start = start; state.extrato.end = end;
      let key = monthKeyOf(start);
      const endKey = monthKeyOf(end);
      const rows = [];
      while(true){
        await loadMonth(key);
        (state.monthCache[key].entries||[]).forEach(e=>{
          if(e.date>=start && e.date<=end) rows.push(e);
        });
        if(key===endKey) break;
        key = shiftMonth(key,1);
      }
      rows.sort((a,b)=>a.date.localeCompare(b.date));
      const totalEntrada = rows.filter(e=>e.type==='entrada').reduce((s,e)=>s+e.amount,0);
      const totalSaida = rows.filter(e=>e.type==='saida').reduce((s,e)=>s+e.amount,0);
      state.extrato.result = { start, end, rows, totalEntrada, totalSaida };
      render();
    }
    else if(act==='print-statement'){ window.print(); }
  };

  const loginPass = document.getElementById('login-pass');
  if(loginPass){
    loginPass.onkeydown = (e)=>{ if(e.key==='Enter') c.querySelector('[data-act="do-login"]').click(); };
  }

  const ob = document.getElementById('opening-balance');
  if(ob){ ob.onchange = async ()=>{ await updateOpeningBalance(state.currentMonth, ob.value); }; }

  ['ef-desc','ef-amount','pf-desc','pf-amount'].forEach(id=>{
    const elm = document.getElementById(id);
    if(elm) elm.oninput = ()=>{
      if(id==='ef-desc') state.entryForm.description = elm.value;
      if(id==='ef-amount') state.entryForm.amount = elm.value;
      if(id==='pf-desc') state.payableForm.description = elm.value;
      if(id==='pf-amount') state.payableForm.amount = elm.value;
    };
  });

  const efCat = document.getElementById('ef-cat');
  if(efCat) efCat.onchange = ()=>{ state.entryForm.category = efCat.value; state.entryForm.funcionario=''; render(); };
  const efFunc = document.getElementById('ef-func');
  if(efFunc) efFunc.onchange = ()=>{ state.entryForm.funcionario = efFunc.value; render(); };
  const pfCat = document.getElementById('pf-cat');
  if(pfCat) pfCat.onchange = ()=>{ state.payableForm.category = pfCat.value; state.payableForm.funcionario=''; render(); };
  const pfFunc = document.getElementById('pf-func');
  if(pfFunc) pfFunc.onchange = ()=>{ state.payableForm.funcionario = pfFunc.value; render(); };
}

/* ---------- boot ---------- */
async function boot(){
  checkSavedLogin();
  if(!state.currentUser){
    render();
    return;
  }
  document.getElementById('content').innerHTML = '<div class="empty">Conectando...</div>';
  if(!db){
    try{ await initFirebase(); } catch(e){ return; }
  }
  await loadMonth(state.currentMonth);
  await loadPayables(state.currentMonth);
  state.loaded = true;
  render();
}
boot();
</script>
</body>
</html>
